<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Zig Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="reset-page">
    <div class="reset-container">
        <div class="reset-header">
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
        </div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="8" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="8" placeholder="••••••••">
            </div>
            <div class="form-error" id="resetError"></div>
            <div class="form-success hidden" id="resetSuccess">✅ Password reset successfully! Redirecting...</div>
            <button type="submit" class="btn-submit">Reset Password</button>
        </form>
    </div>

    <script src="reset-password.js"></script>
</body>
</html>
